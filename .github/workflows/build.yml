name: Build

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Windows
        if: runner.os == 'Windows'
        run: pyinstaller --onefile --windowed --icon=icon.ico --name VideoTranscriber main.py

      - name: Build Linux
        if: runner.os == 'Linux'
        run: pyinstaller --onefile --windowed --icon=icon.png --name VideoTranscriber main.py

      - name: Build macOS
        if: runner.os == 'macOS'
        run: pyinstaller --windowed --icon=icon.png --name VideoTranscriber main.py

      - uses: actions/upload-artifact@v4
        with:
          name: VideoTranscriber-${{ runner.os }}
          path: dist/**
