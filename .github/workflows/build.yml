name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create source zip
        run: |
          zip sourcecode.zip \
            main.py \
            icon.png \
            icon.ico \
            README.md \
            requirements.txt \
            run.bat \
            setup_portable.bat \
            VideoTranscriber.ini

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: sourcecode.zip
          generate_release_notes: true
